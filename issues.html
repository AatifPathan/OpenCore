<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Issues · OpenCore</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/dashboard.css">
<link rel="stylesheet" href="assets/css/responsive.css">
<link rel="stylesheet" href="assets/css/enhancements.css">
</head>
<body>

<div class="app-shell">
  <div id="sidebarMount"></div>

  <div class="main-content">
    <div id="topbarMount"></div>

    <main class="page-content">
      <header class="page-header">
        <div>
          <h1 class="page-title">Issues</h1>
          <p class="page-subtitle">968 open issues across all repositories — find your next contribution</p>
        </div>
      </header>

      <div class="toolbar">
        <div class="toolbar-search">
          <span class="toolbar-search-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
          <input type="text" id="issueSearch" placeholder="Search issues...">
        </div>
        <button class="filter-btn active" data-status="all">All</button>
        <button class="filter-btn" data-status="open">Open</button>
        <button class="filter-btn" data-status="in-progress">In Progress</button>
        <button class="filter-btn" data-status="closed">Closed</button>
        <div class="toolbar-spacer"></div>
        <select class="form-control" id="issueDiffFilter" style="width:auto">
          <option value="">All difficulty</option>
          <option value="Beginner">Beginner</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Advanced">Advanced</option>
        </select>
      </div>

      <div class="card">
        <div id="issueList"></div>
      </div>
    </main>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/api/api.js"></script>
<script src="assets/js/api/repositoryApi.js"></script>
<script src="assets/js/api/otherApis.js"></script>
<script src="assets/js/components/ui-components.js"></script>
<script>
(async function initIssuesPage() {
  'use strict';
  mountLayout('issues.html', { breadcrumb: ['OpenCore', 'Issues'] });

  const STATUS_ICON = {
    open:        `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
    'in-progress': `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
    closed:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`,
  };
  const STATUS_LABEL = { open: 'Open', 'in-progress': 'In Progress', closed: 'Closed' };

  const wrap = document.getElementById('issueList');
  let allIssues = [];
  let statusFilter = 'all';

  // Skeleton rows while loading
  wrap.innerHTML = `
    <div style="padding:0">
      ${Array(6).fill(`
        <div style="display:flex;gap:14px;padding:16px 20px;border-bottom:1px solid var(--color-border)" aria-busy="true">
          <div class="skeleton skeleton-circle" style="width:20px;height:20px;flex-shrink:0;margin-top:2px"></div>
          <div style="flex:1">
            <div class="skeleton skeleton-title" style="width:65%;margin-bottom:8px"></div>
            <div class="skeleton skeleton-text" style="width:45%;margin-bottom:8px"></div>
            <div style="display:flex;gap:6px">
              <div class="skeleton" style="width:60px;height:18px;border-radius:4px"></div>
              <div class="skeleton" style="width:80px;height:18px;border-radius:4px"></div>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
            <div class="skeleton" style="width:52px;height:20px;border-radius:99px"></div>
            <div class="skeleton skeleton-text" style="width:60px"></div>
          </div>
        </div>`).join('')}
    </div>`;

  try {
    // In production: const { records } = await OcApi.sfRequest('/opencore/issues');
    await OcApi.mockDelay(550);
    allIssues = await OcApi.mockResolve(OpenCoreData.issues);
  } catch (err) {
    ErrorState.render(wrap, {
      title: 'Failed to load issues',
      message: err.message,
      onRetry: () => window.location.reload(),
    });
    return;
  }

  function renderIssues() {
    const q    = document.getElementById('issueSearch').value.toLowerCase();
    const diff = document.getElementById('issueDiffFilter').value;
    const list = allIssues.filter(i => {
      const matchStatus = statusFilter === 'all' || i.status === statusFilter;
      const matchSearch = !q || i.title.toLowerCase().includes(q) || i.repo.toLowerCase().includes(q);
      const matchDiff   = !diff || i.difficulty === diff;
      return matchStatus && matchSearch && matchDiff;
    });

    if (!list.length) {
      wrap.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </div>
          <div class="empty-state-title">No issues found</div>
          <div class="empty-state-desc">Try a different search term or clear your filters.</div>
          <button class="btn btn-secondary mt-16" onclick="clearFilters()">Clear Filters</button>
        </div>`;
      return;
    }

    wrap.innerHTML = list.map(iss => `
      <div class="issue-row"
           onclick="window.location.href='repository-details.html?id=${escapeHTML(iss.repoId)}'"
           role="button" tabindex="0"
           onkeydown="if(event.key==='Enter')window.location.href='repository-details.html?id=${escapeHTML(iss.repoId)}'">
        <div class="issue-status-icon ${escapeHTML(iss.status)}">${STATUS_ICON[iss.status] || STATUS_ICON.open}</div>
        <div class="issue-body">
          <span class="issue-title">${escapeHTML(iss.title)}</span>
          <div class="issue-meta">
            <span class="font-mono">${escapeHTML(iss.repo)}</span>
            · opened ${formatDate(iss.createdAt)}
            · ${STATUS_LABEL[iss.status] || iss.status}
            ${iss.assignee ? ` · assigned to <strong>${escapeHTML(iss.assignee)}</strong>` : ''}
          </div>
          <div class="issue-tags">
            ${iss.labels.map(l => `<span class="tag">${escapeHTML(l)}</span>`).join('')}
            ${difficultyBadge(iss.difficulty)}
          </div>
        </div>
        <div class="issue-side">
          <span class="badge badge-primary">${iss.points} pts</span>
          <span class="text-xs text-muted">${iss.applicants} applicants</span>
          <button class="btn btn-sm btn-secondary"
            onclick="event.stopPropagation(); applyToIssue('${escapeHTML(iss.id)}', '${escapeHTML(iss.title)}')">
            Apply
          </button>
        </div>
      </div>`).join('');
  }

  window.applyToIssue = function(issueId, title) {
    Modal.open({
      title: 'Apply to this issue',
      body: `
        <p class="text-secondary mb-16">You are applying to work on: <strong>${escapeHTML(title)}</strong></p>
        <div class="form-group">
          <label class="form-label">Why are you a good fit?</label>
          <textarea class="form-control" rows="3" placeholder="Describe your relevant experience…"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Estimated time to complete</label>
          <select class="form-control">
            <option>1–2 days</option><option>3–5 days</option>
            <option>1–2 weeks</option><option>2–4 weeks</option>
          </select>
        </div>`,
      actions: [
        { label: 'Cancel', type: 'secondary', closeOnClick: true },
        {
          label: 'Submit Application', type: 'primary', closeOnClick: true,
          onClick: () => Toast.success('Application submitted', 'Your application has been sent for review.'),
        },
      ],
    });
  };

  window.clearFilters = function() {
    document.getElementById('issueSearch').value = '';
    document.getElementById('issueDiffFilter').value = '';
    statusFilter = 'all';
    document.querySelectorAll('.filter-btn[data-status]').forEach(b => b.classList.remove('active'));
    document.querySelector('.filter-btn[data-status="all"]').classList.add('active');
    renderIssues();
  };

  document.querySelectorAll('.filter-btn[data-status]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-status]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      statusFilter = btn.getAttribute('data-status');
      renderIssues();
    });
  });
  document.getElementById('issueSearch').addEventListener('input', debounce(renderIssues, 220));
  document.getElementById('issueDiffFilter').addEventListener('change', renderIssues);

  renderIssues();
})();
</script>
</body>
</html>
