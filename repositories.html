<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repositories · OpenCore</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/dashboard.css">
<link rel="stylesheet" href="assets/css/responsive.css">
<link rel="stylesheet" href="assets/css/enhancements.css">
<style>
  .repo-page-layout { display: grid; grid-template-columns: 260px 1fr; gap: 24px; align-items: flex-start; }
  @media (max-width: 1024px) { .repo-page-layout { grid-template-columns: 1fr; } .repo-filter-col { display: none; } }
</style>
</head>
<body>

<div class="app-shell">
  <div id="sidebarMount"></div>

  <div class="main-content">
    <div id="topbarMount"></div>

    <main class="page-content">
      <header class="page-header">
        <div>
          <h1 class="page-title">Repositories</h1>
          <p class="page-subtitle">142 repositories open for contribution across 6 organizations</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Publish Repository
          </button>
        </div>
      </header>

      <div class="repo-page-layout">
        <!-- Filter Panel -->
        <aside class="repo-filter-col">
          <div class="filter-panel">
            <div class="filter-panel-section">
              <div class="filter-panel-title">Difficulty <span class="filter-panel-clear" id="clearDifficulty">Clear</span></div>
              <label class="filter-checkbox"><input type="checkbox" class="diffFilter" value="Beginner"> Beginner <span class="count">38</span></label>
              <label class="filter-checkbox"><input type="checkbox" class="diffFilter" value="Intermediate"> Intermediate <span class="count">35</span></label>
              <label class="filter-checkbox"><input type="checkbox" class="diffFilter" value="Advanced"> Advanced <span class="count">27</span></label>
            </div>
            <div class="filter-panel-section">
              <div class="filter-panel-title">Language</div>
              <label class="filter-checkbox"><input type="checkbox" class="langFilter" value="JavaScript"> JavaScript <span class="count">42</span></label>
              <label class="filter-checkbox"><input type="checkbox" class="langFilter" value="Python"> Python <span class="count">29</span></label>
              <label class="filter-checkbox"><input type="checkbox" class="langFilter" value="Java"> Java <span class="count">18</span></label>
              <label class="filter-checkbox"><input type="checkbox" class="langFilter" value="Go"> Go <span class="count">14</span></label>
              <label class="filter-checkbox"><input type="checkbox" class="langFilter" value="Rust"> Rust <span class="count">11</span></label>
              <label class="filter-checkbox"><input type="checkbox" class="langFilter" value="C++"> C++ <span class="count">9</span></label>
            </div>
            <div class="filter-panel-section">
              <div class="filter-panel-title">Status</div>
              <label class="filter-checkbox"><input type="checkbox" class="statusFilter" value="Active"> Active <span class="count">128</span></label>
              <label class="filter-checkbox"><input type="checkbox" class="statusFilter" value="Archived"> Archived <span class="count">14</span></label>
            </div>
            <div class="filter-panel-section">
              <div class="filter-panel-title">Visibility</div>
              <label class="filter-checkbox"><input type="checkbox" class="visFilter" value="Public"> Public <span class="count">134</span></label>
              <label class="filter-checkbox"><input type="checkbox" class="visFilter" value="Private"> Private <span class="count">8</span></label>
            </div>
          </div>
        </aside>

        <!-- Main Listing -->
        <div>
          <div class="toolbar">
            <div class="toolbar-search">
              <span class="toolbar-search-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
              <input type="text" id="repoSearch" placeholder="Search repositories...">
            </div>
            <button class="filter-btn" id="mobileFilterBtn" style="display:none">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg> Filters
            </button>
            <div class="toolbar-spacer"></div>
            <select class="form-control" id="sortSelect" style="width:auto">
              <option>Sort: Most Stars</option>
              <option>Sort: Most Issues</option>
              <option>Sort: Recently Updated</option>
              <option>Sort: Name (A-Z)</option>
            </select>
            <div class="view-toggle">
              <button class="active" data-tooltip="Grid view"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
              <button data-tooltip="List view"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></button>
            </div>
          </div>

          <section class="repo-grid" id="repoGrid"></section>

          <div class="flex items-center justify-between mt-24">
            <div class="page-info" id="repoPageInfo">Showing 1–12 of 142 repositories</div>
            <div class="pagination">
              <button class="page-btn" disabled><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
              <button class="page-btn active">1</button>
              <button class="page-btn">2</button>
              <button class="page-btn">3</button>
              <span class="page-info">…</span>
              <button class="page-btn">12</button>
              <button class="page-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/api/api.js"></script>
<script src="assets/js/api/repositoryApi.js"></script>
<script src="assets/js/api/otherApis.js"></script>
<script src="assets/js/components/ui-components.js"></script>
<script src="assets/js/services/githubSync.js"></script>
<script>
(async function initRepositoriesPage() {
  'use strict';
  mountLayout('repositories.html', { breadcrumb: ['OpenCore', 'Repositories'] });

  const REPO_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>';
  const GH_ICON   = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 0 0-3.8 23.4c.6.1.8-.3.8-.6v-2.2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1.1-.8.1-.7.1-.7 1.2.1 1.9 1.3 1.9 1.3 1.1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.7-.3-5.5-1.3-5.5-5.9 0-1.3.5-2.4 1.3-3.2-.1-.3-.6-1.6.1-3.2 0 0 1-.3 3.4 1.2 1-.3 2-.4 3-.4s2 .1 3 .4c2.4-1.6 3.4-1.2 3.4-1.2.7 1.6.2 2.9.1 3.2.8.8 1.3 1.9 1.3 3.2 0 4.6-2.8 5.6-5.5 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6A12 12 0 0 0 12 .3z"/></svg>';

  /* ── Show skeletons while loading ── */
  const grid = document.getElementById('repoGrid');
  grid.innerHTML = SkeletonLoader.repeat(SkeletonLoader.repoCard, 6);

  /* ── Load from API ── */
  let allRepos = [];
  try {
    const { records } = await RepositoryApi.getRepositories();
    allRepos = records;
  } catch (err) {
    ErrorState.render(grid, {
      title: 'Failed to load repositories',
      message: err.message,
      code: err.errorCode,
      onRetry: () => window.location.reload(),
    });
    return;
  }

  /* ── Render helpers ── */
  function syncStatusIndicator(repo) {
    const s = repo.syncStatus || 'never';
    const label = { never: 'Not synced', success: 'Synced', error: 'Sync error', syncing: 'Syncing…' }[s] || 'Unknown';
    return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--color-text-muted)">
      <span class="sync-status-dot ${s}" style="width:6px;height:6px"></span>${label}
    </span>`;
  }

  function renderRepos(list) {
    if (!list.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
          <div class="empty-state-title">No repositories match your filters</div>
          <div class="empty-state-desc">Try removing some filters or searching a different term.</div>
        </div>`;
      return;
    }
    grid.innerHTML = list.map(repo => `
      <article class="repo-card" onclick="window.location.href='repository-details.html?id=${escapeHTML(repo.id)}'">
        <div class="repo-card-header">
          <div>
            <div class="repo-card-org">${avatarHTML(repo.org, 'xs')} ${escapeHTML(repo.org)}</div>
            <div class="repo-card-name">
              ${REPO_ICON} ${escapeHTML(repo.name)}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <span class="badge ${repo.visibility === 'Public' ? 'badge-neutral' : 'badge-warning'}">${repo.visibility}</span>
            ${GH_ICON ? `<span style="opacity:.6">${GH_ICON}</span>` : ''}
          </div>
        </div>
        <p class="repo-card-desc">${escapeHTML(repo.description)}</p>
        <div class="repo-card-tags">
          ${difficultyBadge(repo.difficulty)}
          <span class="badge ${repo.status === 'Active' ? 'badge-success' : 'badge-neutral'}">${repo.status}</span>
          ${GitHubSyncService.renderHealthBadge(repo.healthScore)}
        </div>
        <div class="repo-card-stats">
          <span class="repo-stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> ${formatCompact(repo.stars)}</span>
          <span class="repo-stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M6 9v6"/><path d="M18 9a9 9 0 0 1-9 9"/><circle cx="18" cy="6" r="3"/></svg> ${formatCompact(repo.forks)}</span>
          <span class="repo-stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg> ${formatCompact(repo.watchers)}</span>
          <span class="repo-stat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ${repo.openIssues}</span>
          ${syncStatusIndicator(repo)}
        </div>
        <div class="repo-card-footer">
          ${languageTag(repo.language)}
          <div style="display:flex;gap:6px" onclick="event.stopPropagation()">
            <button class="btn btn-sm btn-secondary" onclick="quickSync('${escapeHTML(repo.id)}',this)" data-tooltip="Sync from GitHub">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.45"/></svg>
            </button>
            <button class="btn btn-sm btn-secondary" onclick="window.location.href='repository-details.html?id=${escapeHTML(repo.id)}'">View</button>
          </div>
        </div>
      </article>
    `).join('');

    document.getElementById('repoPageInfo').textContent =
      `Showing 1–${list.length} of ${list.length} repositories`;
  }

  /* ── Quick sync from card ── */
  window.quickSync = async function(repoId, btn) {
    const origHTML = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="13" height="13" class="oc-spin"><circle cx="12" cy="12" r="10" stroke-opacity=".2"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>';

    await GitHubSyncService.syncRepository(repoId, {
      onSuccess: (_result, refreshedRepo) => {
        // Update just this card's stats
        const idx = allRepos.findIndex(r => r.id === repoId);
        if (idx !== -1) allRepos[idx] = refreshedRepo;
        applyFilters();
      },
      onFinally: () => {
        btn.disabled = false;
        btn.innerHTML = origHTML;
      },
    });
  };

  /* ── Filtering ── */
  let activeFilters = { difficulty: [], language: [], status: [], visibility: [] };

  function applyFilters() {
    const q = document.getElementById('repoSearch').value.toLowerCase();
    let list = allRepos.filter(r => {
      const matchesSearch = r.name.toLowerCase().includes(q) || r.org.toLowerCase().includes(q) || r.tags.some(t => t.includes(q));
      const matchesDiff   = !activeFilters.difficulty.length || activeFilters.difficulty.includes(r.difficulty);
      const matchesLang   = !activeFilters.language.length   || activeFilters.language.includes(r.language);
      const matchesStatus = !activeFilters.status.length     || activeFilters.status.includes(r.status);
      const matchesVis    = !activeFilters.visibility.length || activeFilters.visibility.includes(r.visibility);
      return matchesSearch && matchesDiff && matchesLang && matchesStatus && matchesVis;
    });
    renderRepos(list);
  }

  document.querySelectorAll('.diffFilter').forEach(cb => cb.addEventListener('change', () => {
    activeFilters.difficulty = [...document.querySelectorAll('.diffFilter:checked')].map(c => c.value);
    applyFilters();
  }));
  document.querySelectorAll('.langFilter').forEach(cb => cb.addEventListener('change', () => {
    activeFilters.language = [...document.querySelectorAll('.langFilter:checked')].map(c => c.value);
    applyFilters();
  }));
  document.querySelectorAll('.statusFilter').forEach(cb => cb.addEventListener('change', () => {
    activeFilters.status = [...document.querySelectorAll('.statusFilter:checked')].map(c => c.value);
    applyFilters();
  }));
  document.querySelectorAll('.visFilter').forEach(cb => cb.addEventListener('change', () => {
    activeFilters.visibility = [...document.querySelectorAll('.visFilter:checked')].map(c => c.value);
    applyFilters();
  }));
  document.getElementById('clearDifficulty').addEventListener('click', () => {
    document.querySelectorAll('.diffFilter').forEach(c => c.checked = false);
    activeFilters.difficulty = [];
    applyFilters();
  });
  document.getElementById('repoSearch').addEventListener('input', debounce(applyFilters, 200));
  document.querySelector('#sortSelect').addEventListener('change', (e) => {
    const val = e.target.value;
    if (val.includes('Stars'))   allRepos.sort((a,b) => b.stars - a.stars);
    if (val.includes('Issues'))  allRepos.sort((a,b) => b.openIssues - a.openIssues);
    if (val.includes('Name'))    allRepos.sort((a,b) => a.name.localeCompare(b.name));
    applyFilters();
  });

  document.querySelectorAll('.view-toggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  renderRepos(allRepos);
})();
</script>
</body>
</html>
