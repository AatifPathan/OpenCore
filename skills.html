<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills · OpenCore</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/dashboard.css">
<link rel="stylesheet" href="assets/css/responsive.css">
<link rel="stylesheet" href="assets/css/enhancements.css">
</head>
<body>

<div class="app-shell">
  <div id="sidebarMount"></div>

  <div class="main-content">
    <div id="topbarMount"></div>

    <main class="page-content">
      <header class="page-header">
        <div>
          <h1 class="page-title">Skills</h1>
          <p class="page-subtitle">Browse skills in demand across active repositories</p>
        </div>
      </header>

      <div class="toolbar">
        <div class="toolbar-search">
          <span class="toolbar-search-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
          <input type="text" id="skillSearch" placeholder="Search skills...">
        </div>
        <button class="filter-btn active" data-cat="all">All</button>
        <button class="filter-btn" data-cat="Language">Languages</button>
        <button class="filter-btn" data-cat="Framework">Frameworks</button>
        <button class="filter-btn" data-cat="DevOps">DevOps</button>
        <button class="filter-btn" data-cat="Domain">Domain</button>
      </div>

      <section class="skill-grid" id="skillGrid"></section>

      <div class="card mt-24">
        <div class="card-header"><div class="card-title">My Skill Endorsements</div></div>
        <div class="card-body">
          <p class="text-secondary text-sm mb-16">Skills contributors have endorsed on your profile based on merged contributions.</p>
          <div class="flex flex-col gap-16">
            <div>
              <div class="flex justify-between mb-4"><span class="text-sm font-medium">JavaScript</span><span class="text-xs text-muted">42 endorsements</span></div>
              <div class="progress"><div class="progress-bar" style="width:88%"></div></div>
            </div>
            <div>
              <div class="flex justify-between mb-4"><span class="text-sm font-medium">React</span><span class="text-xs text-muted">31 endorsements</span></div>
              <div class="progress"><div class="progress-bar" style="width:71%"></div></div>
            </div>
            <div>
              <div class="flex justify-between mb-4"><span class="text-sm font-medium">Accessibility</span><span class="text-xs text-muted">18 endorsements</span></div>
              <div class="progress"><div class="progress-bar warning" style="width:45%"></div></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/config.js"></script> 
<script src="assets/js/api/api.js"></script>
<script src="assets/js/api/repositoryApi.js"></script>
<script src="assets/js/api/otherApis.js"></script>
<script src="assets/js/components/ui-components.js"></script>
<script>
(async function initSkillsPage() {
  'use strict';
  mountLayout('skills.html', { breadcrumb: ['OpenCore', 'Skills'] });

  const grid = document.getElementById('skillGrid');
  let allSkills = [];
  let catFilter = 'all';

  grid.innerHTML = Array(8).fill(`
    <div class="skill-card" aria-busy="true">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="skeleton skeleton-circle" style="width:36px;height:36px"></div>
        <div class="skeleton" style="width:60px;height:18px;border-radius:4px"></div>
      </div>
      <div class="skeleton skeleton-title" style="width:60%;margin-bottom:6px"></div>
      <div class="skeleton skeleton-text" style="width:80%;margin-bottom:4px"></div>
      <div class="skeleton skeleton-text" style="width:60%"></div>
    </div>`).join('');

  try {
    // In production: const { records } = await OcApi.sfRequest('/opencore/skills');
    await OcApi.mockDelay(450);
    allSkills = await OcApi.mockResolve(OpenCoreData.skills);
  } catch (err) {
    ErrorState.render(grid, { title: 'Failed to load skills', message: err.message, onRetry: () => window.location.reload() });
    return;
  }

  const maxContribs = Math.max(...allSkills.map(s => s.contributors));

  function renderSkills() {
    const q = document.getElementById('skillSearch').value.toLowerCase();
    const list = allSkills.filter(s => {
      const matchCat    = catFilter === 'all' || s.category === catFilter;
      const matchSearch = !q || s.name.toLowerCase().includes(q);
      return matchCat && matchSearch;
    });

    if (!list.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.59 13.41 13.42 20.58a2 2 0 0 1-2.83 0L2.41 12.41A2 2 0 0 1 1.83 11V4a2 2 0 0 1 2-2h7a2 2 0 0 1 1.41.59l8.35 8.35a2 2 0 0 1 0 2.83z"/>
            </svg>
          </div>
          <div class="empty-state-title">No skills found</div>
          <div class="empty-state-desc">Try a different search term or category.</div>
        </div>`;
      return;
    }

    grid.innerHTML = list.map(s => `
      <div class="skill-card">
        <div class="skill-card-top">
          <div class="skill-icon">${s.icon}</div>
          <span class="tag">${escapeHTML(s.category)}</span>
        </div>
        <div class="skill-name">${escapeHTML(s.name)}</div>
        <div class="skill-meta">${formatCompact(s.contributors)} contributors</div>
        <div class="skill-meta mt-4">${s.openIssues} open issues</div>
        <div class="progress mt-8" style="height:4px" title="${s.contributors} contributors">
          <div class="progress-bar" style="width:${Math.round((s.contributors/maxContribs)*100)}%"></div>
        </div>
      </div>`).join('');
  }

  document.querySelectorAll('.filter-btn[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-cat]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      catFilter = btn.getAttribute('data-cat');
      renderSkills();
    });
  });
  document.getElementById('skillSearch').addEventListener('input', debounce(renderSkills, 220));

  renderSkills();
})();
</script>
</body>
</html>
