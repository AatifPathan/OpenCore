<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contributions · OpenCore</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/dashboard.css">
<link rel="stylesheet" href="assets/css/responsive.css">
<link rel="stylesheet" href="assets/css/enhancements.css">
</head>
<body>

<div class="app-shell">
  <div id="sidebarMount"></div>

  <div class="main-content">
    <div id="topbarMount"></div>

    <main class="page-content">
      <header class="page-header">
        <div>
          <h1 class="page-title">Contributions</h1>
          <p class="page-subtitle">Track merged pull requests, commits, and reviews across the platform</p>
        </div>
      </header>

      <div class="toolbar">
        <button class="filter-btn active" data-type="all">All</button>
        <button class="filter-btn" data-type="pr">Pull Requests</button>
        <button class="filter-btn" data-type="review">Reviews</button>
        <button class="filter-btn" data-type="issue">Issues Closed</button>
        <div class="toolbar-spacer"></div>
        <select class="form-control" style="width:auto">
          <option>Last 30 days</option>
          <option>Last 90 days</option>
          <option>This year</option>
          <option>All time</option>
        </select>
      </div>

      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th>Contributor</th>
              <th>Type</th>
              <th>Repository</th>
              <th>Description</th>
              <th>Points</th>
              <th>Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="contribTable"></tbody>
        </table>
      </div>

      <div class="flex items-center justify-between mt-24">
        <div class="page-info">Showing 1–10 of 1,520 contributions</div>
        <div class="pagination">
          <button class="page-btn" disabled><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <span class="page-info">…</span>
          <button class="page-btn">152</button>
          <button class="page-btn"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/api/api.js"></script>
<script src="assets/js/api/repositoryApi.js"></script>
<script src="assets/js/api/otherApis.js"></script>
<script src="assets/js/components/ui-components.js"></script>
<script>
(async function initContributionsPage() {
  'use strict';
  mountLayout('contributions.html', { breadcrumb: ['OpenCore', 'Contributions'] });

  const STATUS_BADGE = {
    Merged:     'badge-success',
    Closed:     'badge-info',
    'In Review':'badge-warning',
    Completed:  'badge-neutral',
  };

  const tbody = document.getElementById('contribTable');
  let allContributions = [];
  let typeFilter = 'all';

  // Skeleton rows while loading
  tbody.innerHTML = SkeletonLoader.repeat(() => SkeletonLoader.tableRow(7), 6);

  try {
    const { records } = await ContributionApi.getContributions();
    allContributions = records;
  } catch (err) {
    const table = tbody.closest('.table-wrapper');
    if (table) ErrorState.render(table, { title: 'Failed to load contributions', message: err.message, onRetry: () => window.location.reload() });
    return;
  }

  function renderTable(list) {
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="7">
        <div class="empty-state">
          <div class="empty-state-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
          </div>
          <div class="empty-state-title">No contributions found</div>
          <div class="empty-state-desc">Try changing the filter or date range.</div>
        </div>
      </td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(c => `
      <tr>
        <td><div class="flex items-center gap-8">${avatarHTML(c.user, 'sm')}<span class="font-medium">${escapeHTML(c.user)}</span></div></td>
        <td><span class="tag">${escapeHTML(c.type)}</span></td>
        <td class="font-mono text-sm">${escapeHTML(c.repo)}</td>
        <td class="truncate" style="max-width:260px" title="${escapeHTML(c.desc)}">${escapeHTML(c.desc)}</td>
        <td><span class="badge badge-primary">${c.points} pts</span></td>
        <td><span class="badge ${STATUS_BADGE[c.status] || 'badge-neutral'}">${escapeHTML(c.status)}</span></td>
        <td class="text-muted text-sm">${formatDate(c.date)}</td>
      </tr>`).join('');
  }

  function applyFilters() {
    const list = typeFilter === 'all'
      ? allContributions
      : allContributions.filter(c => c.type === typeFilter);
    renderTable(list);
  }

  // Wire type filter buttons
  document.querySelectorAll('.filter-btn[data-type]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn[data-type]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      typeFilter = btn.getAttribute('data-type');
      applyFilters();
    });
  });

  renderTable(allContributions);
})();
</script>
</body>
</html>
