<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentors · OpenCore</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/dashboard.css">
<link rel="stylesheet" href="assets/css/responsive.css">
<link rel="stylesheet" href="assets/css/enhancements.css">
</head>
<body>

<div class="app-shell">
  <div id="sidebarMount"></div>

  <div class="main-content">
    <div id="topbarMount"></div>

    <main class="page-content">
      <header class="page-header">
        <div>
          <h1 class="page-title">Mentors</h1>
          <p class="page-subtitle">Experienced contributors guiding the next generation of maintainers</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" id="becomeMentorBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
            Become a Mentor
          </button>
        </div>
      </header>

      <div class="toolbar">
        <div class="toolbar-search">
          <span class="toolbar-search-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
          <input type="text" id="mentorSearch" placeholder="Search mentors or skills...">
        </div>
      </div>

      <section class="mentor-grid" id="mentorGrid"></section>
    </main>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/api/api.js"></script>
<script src="assets/js/api/repositoryApi.js"></script>
<script src="assets/js/api/otherApis.js"></script>
<script src="assets/js/components/ui-components.js"></script>
<script>
(async function initMentorsPage() {
  'use strict';
  mountLayout('mentors.html', { breadcrumb: ['OpenCore', 'Mentors'] });

  const grid = document.getElementById('mentorGrid');
  grid.innerHTML = Array(6).fill(`
    <div class="mentor-card" aria-busy="true">
      <div class="skeleton skeleton-circle" style="width:48px;height:48px;flex-shrink:0"></div>
      <div style="flex:1">
        <div class="skeleton skeleton-title" style="width:55%;margin-bottom:6px"></div>
        <div class="skeleton skeleton-text" style="width:75%;margin-bottom:12px"></div>
        <div style="display:flex;gap:12px;margin-bottom:10px">
          <div class="skeleton skeleton-text" style="width:60px"></div>
          <div class="skeleton skeleton-text" style="width:60px"></div>
          <div class="skeleton skeleton-text" style="width:40px"></div>
        </div>
        <div class="skeleton" style="width:120px;height:28px;border-radius:6px"></div>
      </div>
    </div>`).join('');

  let allMentors = [];
  try {
    // In production: const { records } = await OcApi.sfRequest('/opencore/mentors');
    await OcApi.mockDelay(500);
    allMentors = await OcApi.mockResolve(OpenCoreData.mentors);
  } catch (err) {
    ErrorState.render(grid, { title: 'Failed to load mentors', message: err.message, onRetry: () => window.location.reload() });
    return;
  }

  function renderMentors(list) {
    if (!list.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
            </svg>
          </div>
          <div class="empty-state-title">No mentors found</div>
          <div class="empty-state-desc">Try a different search term.</div>
        </div>`;
      return;
    }
    grid.innerHTML = list.map(m => `
      <div class="mentor-card">
        ${avatarHTML(m.name, 'lg')}
        <div class="mentor-info">
          <div class="mentor-name">${escapeHTML(m.name)}</div>
          <div class="mentor-title">${escapeHTML(m.title)}</div>
          <div class="mentor-stats">
            <span>👥 ${m.mentees} mentees</span>
            <span>🗓️ ${m.sessionsHeld} sessions</span>
            <span>⭐ ${m.rating}</span>
          </div>
          <div class="flex flex-wrap gap-6 mb-8">
            ${m.skills.map(s => `<span class="tag">${escapeHTML(s)}</span>`).join('')}
          </div>
          <div class="mentor-mentees">
            <button class="btn btn-sm btn-primary" onclick="requestMentorship('${escapeHTML(m.id)}','${escapeHTML(m.name)}')">
              Request Mentorship
            </button>
          </div>
        </div>
      </div>`).join('');
  }

  window.requestMentorship = function(mentorId, name) {
    Modal.open({
      title: `Request mentorship from ${name}`,
      body: `
        <p class="text-secondary mb-16">Describe what you'd like to learn and your current experience level.</p>
        <div class="form-group">
          <label class="form-label">What do you want to learn?</label>
          <textarea class="form-control" rows="3" placeholder="e.g. I want to improve my Kubernetes skills for cloud-native deployments…"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Your experience level</label>
          <select class="form-control">
            <option>Complete beginner</option>
            <option>Some experience</option>
            <option>Intermediate</option>
            <option>Advanced — looking for peer review</option>
          </select>
        </div>`,
      actions: [
        { label: 'Cancel', type: 'secondary', closeOnClick: true },
        {
          label: 'Send Request', type: 'primary', closeOnClick: true,
          onClick: () => Toast.success('Request sent', `Your mentorship request to ${name} has been submitted.`),
        },
      ],
    });
  };

  document.getElementById('mentorSearch').addEventListener('input', debounce((e) => {
    const q = e.target.value.toLowerCase();
    renderMentors(allMentors.filter(m =>
      m.name.toLowerCase().includes(q) || m.skills.some(s => s.toLowerCase().includes(q))
    ));
  }, 220));

  document.getElementById('becomeMentorBtn').addEventListener('click', () => {
    Modal.open({
      title: 'Apply to become a mentor',
      body: `
        <p class="text-secondary mb-16">Share your expertise and guide new contributors. You need a Gold rank or higher to apply.</p>
        <div class="form-group">
          <label class="form-label">Your specialisation</label>
          <input class="form-control" type="text" placeholder="e.g. Kubernetes, Python, DevOps">
        </div>
        <div class="form-group">
          <label class="form-label">How many mentees can you support?</label>
          <select class="form-control"><option>1–2</option><option>3–5</option><option>6–10</option></select>
        </div>`,
      actions: [
        { label: 'Cancel', type: 'secondary', closeOnClick: true },
        { label: 'Submit Application', type: 'primary', closeOnClick: true,
          onClick: () => Toast.success('Application submitted', 'Your mentor application is under review.') },
      ],
    });
  });

  renderMentors(allMentors);
})();
</script>
</body>
</html>
