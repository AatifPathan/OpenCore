<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organizations · OpenCore</title>
<link rel="stylesheet" href="assets/css/style.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/dashboard.css">
<link rel="stylesheet" href="assets/css/responsive.css">
<link rel="stylesheet" href="assets/css/enhancements.css">
</head>
<body>

<div class="app-shell">
  <div id="sidebarMount"></div>

  <div class="main-content">
    <div id="topbarMount"></div>

    <main class="page-content">
      <header class="page-header">
        <div>
          <h1 class="page-title">Organizations</h1>
          <p class="page-subtitle">Open-source organizations publishing projects on OpenCore</p>
        </div>
        <div class="page-actions">
          <button class="btn btn-primary" id="newOrgBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Organization
          </button>
        </div>
      </header>

      <div class="toolbar">
        <div class="toolbar-search">
          <span class="toolbar-search-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
          <input type="text" id="orgSearch" placeholder="Search organizations...">
        </div>
        <button class="filter-btn active">All <span class="filter-count">6</span></button>
        <button class="filter-btn">Verified</button>
        <button class="filter-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          Filters
        </button>
      </div>

      <section class="org-grid" id="orgGrid"></section>

      <div class="flex items-center justify-between mt-24">
        <div class="page-info">Showing 1–6 of 6 organizations</div>
        <div class="pagination">
          <button class="page-btn" disabled><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
          <button class="page-btn active">1</button>
          <button class="page-btn" disabled><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/api/api.js"></script>
<script src="assets/js/api/repositoryApi.js"></script>
<script src="assets/js/api/otherApis.js"></script>
<script src="assets/js/components/ui-components.js"></script>
<script>
(async function initOrganizationsPage() {
  'use strict';
  mountLayout('organizations.html', { breadcrumb: ['OpenCore', 'Organizations'] });

  const grid = document.getElementById('orgGrid');
  const VERIFIED_BADGE = `<svg width="14" height="14" viewBox="0 0 24 24" fill="#0057D9" stroke="white" stroke-width="1" style="display:inline-block;vertical-align:middle"><path d="M12 2l2.4 1.6 2.8-.5 1.3 2.5 2.5 1.3-.5 2.8L22 12l-1.6 2.4.5 2.8-2.5 1.3-1.3 2.5-2.8-.5L12 22l-2.4-1.6-2.8.5-1.3-2.5-2.5-1.3.5-2.8L2 12l1.6-2.4-.5-2.8 2.5-1.3 1.3-2.5 2.8.5z"/></svg>`;

  // Skeletons while loading
  grid.innerHTML = Array(6).fill(`
    <div class="org-card" aria-busy="true">
      <div style="display:flex;gap:12px;margin-bottom:14px">
        <div class="skeleton skeleton-circle" style="width:48px;height:48px;flex-shrink:0"></div>
        <div style="flex:1"><div class="skeleton skeleton-title" style="width:70%;margin-bottom:6px"></div><div class="skeleton skeleton-text" style="width:40%"></div></div>
      </div>
      <div class="skeleton skeleton-text" style="width:100%;margin-bottom:6px"></div>
      <div class="skeleton skeleton-text" style="width:80%;margin-bottom:16px"></div>
      <div style="display:flex;gap:18px"><div class="skeleton skeleton-text" style="width:40px"></div><div class="skeleton skeleton-text" style="width:40px"></div><div class="skeleton skeleton-text" style="width:40px"></div></div>
    </div>`).join('');

  let allOrgs = [];
  try {
    const response = await OrganizationApi.getOrganizations();
    allOrgs = response.records || response;
  } catch (err) {
    ErrorState.render(grid, { title: 'Failed to load organizations', message: err.message, code: err.errorCode, onRetry: () => window.location.reload() });
    return;
  }

  function renderOrgs(list) {
    if (!list.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
          <div class="empty-state-title">No organizations found</div>
          <div class="empty-state-desc">Try adjusting your search or filters.</div>
        </div>`;
      return;
    }
    grid.innerHTML = list.map(org => `
      <div class="org-card" onclick="window.location.href='projects.html'" style="cursor:pointer">
        <div class="org-card-header">
          <div class="org-logo">${escapeHTML(org.name.charAt(0))}</div>
          <div>
            <div class="org-card-name">${escapeHTML(org.name)} ${org.verified ? VERIFIED_BADGE : ''}</div>
            <div class="org-card-handle">${escapeHTML(org.handle)}</div>
          </div>
        </div>
        <p class="org-card-desc">${escapeHTML(org.description)}</p>
        <div class="org-card-stats">
          <div><div class="org-stat-value">${org.repos}</div><div class="org-stat-label">Repos</div></div>
          <div><div class="org-stat-value">${formatCompact(org.contributors)}</div><div class="org-stat-label">Contributors</div></div>
          <div><div class="org-stat-value">${org.projects}</div><div class="org-stat-label">Projects</div></div>
        </div>
      </div>`).join('');
  }

  renderOrgs(allOrgs);

  document.getElementById('orgSearch').addEventListener('input', debounce(async (e) => {
    const q = e.target.value.trim();
    try {
    const response = await OrganizationApi.getOrganizations(q ? { query: q } : {});
    renderOrgs(response.records || response);
    } catch { renderOrgs(allOrgs.filter(o => o.name.toLowerCase().includes(q.toLowerCase()))); }
  }, 250));

  document.getElementById('newOrgBtn').addEventListener('click', () => {
    Toast.info('Coming soon', 'Organization creation will be available in the next release.');
  });
})();
</script>
</body>
</html>
